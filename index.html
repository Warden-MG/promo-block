<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Project</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

<header class="header">
  <div class="header__container">
    <a href="#" class="header__logo logo">
      <img src="/src/assets/images/logo.svg" alt="Логотип" class="logo__image">
    </a>

    <nav class="header__nav nav">
      <ul class="nav__list">
        <li class="nav__item">
          <a href="#" class="nav__link">About us</a>
        </li>

        <li class="nav__item">
          <a href="#" class="nav__link nav__link--active">Courses</a>
        </li>

        <li class="nav__item">
          <a href="#" class="nav__link">Certificate</a>
        </li>

        <li class="nav__item">
          <a href="#" class="nav__link">News</a>
        </li>

        <li class="nav__item">
          <a href="#" class="nav__link">Contact us</a>
        </li>
      </ul>
    </nav>

    <a href="#" class="header__button call-button">Call us</a>

    <button class="header__burger burger" type="button" aria-label="Открыть меню">
      <span class="burger__line"></span>
      <span class="burger__line"></span>
      <span class="burger__line"></span>
    </button>
  </div>
</header>

<main>
  <section class="banner">
    <div class="banner__container">
      <h1 class="banner__title">Заголовок</h1>
      <p class="banner__text">Описание блока</p>
      <a href="#" class="banner__button banner__button--styled">Подробнее</a>
    </div>
  </section>

  <section class="slogan">
    <div class="slogan__container">
      <h2 class="slogan__title">Наши преимущества</h2>
    </div>
  </section>

  <section class="courses">
    <div class="courses__container">
      <h2 class="courses__title">Курсы</h2>

      <div class="courses__slider swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">Курс 1</div>
          <div class="swiper-slide">Курс 2</div>
          <div class="swiper-slide">Курс 3</div>
        </div>
      </div>
    </div>
  </section>
</main>

<script type="module" src="/src/js/main.js"></script>
</body>
</html>
