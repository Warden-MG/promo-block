<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Project</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

<header class="header">
  <div class="header__container">
    <a href="#" class="header__logo">Logo</a>

    <button class="header__burger burger" type="button">
      <span></span>
    </button>

    <nav class="header__menu">
      <a href="#" class="header__link">Главная</a>
      <a href="#" class="header__link">Курсы</a>
    </nav>
  </div>
</header>

<main>
  <section class="banner">
    <div class="banner__container">
      <h1 class="banner__title">Заголовок</h1>
      <p class="banner__text">Описание блока</p>
      <a href="#" class="banner__button button">Подробнее</a>
    </div>
  </section>

  <section class="slogan">
    <div class="slogan__container">
      <h2 class="slogan__title">Наши преимущества</h2>
    </div>
  </section>

  <section class="courses">
    <div class="courses__container">
      <h2 class="courses__title">Курсы</h2>

      <div class="courses__slider swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">Курс 1</div>
          <div class="swiper-slide">Курс 2</div>
          <div class="swiper-slide">Курс 3</div>
        </div>
      </div>
    </div>
  </section>
</main>

<script type="module" src="/src/js/main.js"></script>
</body>
</html>
